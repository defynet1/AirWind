<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirWind</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0f11;--sf:#16181c;--sf2:#1e2127;--sf3:#272b33;
  --br:#2a2e38;--ac:#5b8cff;--ac2:#7c5cfc;
  --sent:#2a3f6b;--sent-t:#c8d8ff;--recv:#1e2127;
  --tx:#e8eaf0;--tx2:#8890a4;--tx3:#555d70;
  --red:#ff5c6a;--green:#3ecf8e;--yellow:#ffd93d;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── AUTH ── */
#auth{display:flex;align-items:center;justify-content:center;height:100vh;background-image:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(91,140,255,.12),transparent 70%)}
.abox{width:380px;background:var(--sf);border:1px solid var(--br);border-radius:20px;padding:36px;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.alogo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.alogo-ico{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:18px}
.alogo-name{font-size:22px;font-weight:600;letter-spacing:-.5px}
.atabs{display:flex;gap:4px;background:var(--sf2);border-radius:10px;padding:4px;margin-bottom:24px}
.atab{flex:1;padding:8px;border:none;background:transparent;color:var(--tx2);font-family:var(--font);font-size:14px;font-weight:500;border-radius:7px;cursor:pointer;transition:.2s}
.atab.on{background:var(--sf3);color:var(--tx)}
.afield{margin-bottom:13px}
.afield label{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.afield input{width:100%;background:var(--sf2);border:1px solid var(--br);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;transition:.2s}
.afield input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,140,255,.12)}
.afield input::placeholder{color:var(--tx3)}
.abtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:.15s;margin-top:4px}
.abtn:hover{opacity:.9;transform:translateY(-1px)}
.abtn:disabled{opacity:.45;cursor:default;transform:none}
.aerr{background:rgba(255,92,106,.1);border:1px solid rgba(255,92,106,.25);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.conn{font-size:12px;text-align:center;margin-bottom:14px;color:var(--tx3)}
.conn.ok{color:var(--green)} .conn.err{color:var(--red)}

/* ── APP ── */
#app{display:none;height:100vh}
#app.on{display:flex}
#sidebar{width:300px;min-width:300px;background:var(--sf);border-right:1px solid var(--br);display:flex;flex-direction:column}
.sh{padding:14px 14px 10px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px}
.slogo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.stitle{font-size:16px;font-weight:600;flex:1;letter-spacing:-.3px}
.ibtn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;flex-shrink:0}
.ibtn:hover{background:var(--sf2);color:var(--tx)}
.swrap{padding:9px 11px;border-bottom:1px solid var(--br)}
.sinput{width:100%;background:var(--sf2);border:1px solid var(--br);border-radius:9px;padding:7px 11px;color:var(--tx);font-family:var(--font);font-size:13px;outline:none;transition:.2s}
.sinput:focus{border-color:var(--ac)}
.sinput::placeholder{color:var(--tx3)}
#clist{flex:1;overflow-y:auto}
#clist::-webkit-scrollbar{width:3px}
#clist::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.ci{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.03);transition:.12s}
.ci:hover{background:var(--sf2)} .ci.on{background:rgba(91,140,255,.08)}
.gci{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:2px solid rgba(91,140,255,.2);transition:.12s;background:linear-gradient(90deg,rgba(91,140,255,.07),transparent)}
.gci:hover{background:linear-gradient(90deg,rgba(91,140,255,.14),transparent)} .gci.on{background:rgba(91,140,255,.12)}
.gav{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;background:linear-gradient(135deg,var(--ac),var(--ac2));box-shadow:0 3px 10px rgba(91,140,255,.3)}
.gbadge{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-radius:5px;font-size:10px;font-weight:600;padding:2px 5px;font-family:var(--mono)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;color:#fff;position:relative}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--sf)}
.cmeta{flex:1;min-width:0}
.cnrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.cname{font-size:14px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.ctime{font-size:11px;color:var(--tx3);flex-shrink:0;font-family:var(--mono)}
.cprev{font-size:12px;color:var(--tx2);display:flex;justify-content:space-between;align-items:center}
.cprev span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ubadge{background:var(--ac);color:#fff;border-radius:10px;font-size:11px;font-weight:600;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;font-family:var(--mono)}
.eml{padding:36px 20px;text-align:center;color:var(--tx3);font-size:13px;line-height:1.6}
.eml-ico{font-size:28px;margin-bottom:10px;opacity:.35}

/* ── CHAT AREA ── */
#carea{flex:1;display:flex;flex-direction:column;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(91,140,255,.04),transparent 60%)}
.ch{padding:13px 18px;border-bottom:1px solid var(--br);background:var(--sf);display:flex;align-items:center;gap:11px}
.chi{flex:1;min-width:0}
.chname{font-size:15px;font-weight:600;letter-spacing:-.2px}
.chsub{font-size:12px;color:var(--tx2);margin-top:1px}
.typing-bar{font-size:12px;color:var(--ac);font-style:italic;margin-top:1px;min-height:16px}
#msgs{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:1px}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.dchip{text-align:center;margin:10px 0 6px}
.dchip span{background:var(--sf);border:1px solid var(--br);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--tx3);font-family:var(--mono)}
.mr{display:flex;margin:1px 0;position:relative}
.mr:hover .msg-actions{opacity:1}
.mr.sent{justify-content:flex-end}
.mr.recv{justify-content:flex-start}
.mb{max-width:66%;padding:8px 13px 7px;border-radius:18px;position:relative;animation:pop .17s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.mr.sent .mb{background:var(--sent);color:var(--sent-t);border-radius:18px 18px 4px 18px}
.mr.recv .mb{background:var(--recv);color:var(--tx);border:1px solid var(--br);border-radius:18px 18px 18px 4px}
.msender{font-size:11px;font-weight:600;color:var(--ac);margin-bottom:2px}
.mtext{font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.mtext.deleted{color:var(--tx3);font-style:italic}
.mfooter{display:flex;align-items:center;gap:4px;margin-top:3px;justify-content:flex-end}
.mtime{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.mread{font-size:11px;color:var(--ac)}
.medit{font-size:10px;color:var(--tx3);font-style:italic}
/* message context menu */
.msg-actions{position:absolute;top:-30px;right:0;display:flex;gap:3px;background:var(--sf2);border:1px solid var(--br);border-radius:8px;padding:3px 5px;opacity:0;transition:.15s;z-index:10}
.mr.recv .msg-actions{right:auto;left:0}
.mac{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;color:var(--tx2);transition:.12s}
.mac:hover{background:var(--sf3);color:var(--tx)}
/* reply preview */
.reply-preview{background:var(--sf2);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;padding:6px 10px;margin-bottom:6px;font-size:12px;color:var(--tx2);cursor:pointer}
.reply-preview strong{color:var(--ac);display:block;margin-bottom:2px;font-size:11px}
/* no chat */
.noc{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--tx3);gap:10px}
.noc-ico{width:60px;height:60px;border-radius:18px;background:var(--sf);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:26px;opacity:.45}

/* ── INPUT BAR ── */
.ibar{padding:10px 16px 14px;border-top:1px solid var(--br);background:var(--sf)}
.reply-strip{display:none;align-items:center;gap:8px;padding:6px 10px;background:var(--sf2);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--ac)}
.reply-strip.on{display:flex}
.reply-strip-text{flex:1;font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-strip-close{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:0 2px}
.edit-strip{display:none;align-items:center;gap:8px;padding:6px 10px;background:rgba(91,140,255,.08);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--yellow)}
.edit-strip.on{display:flex}
.edit-strip-text{flex:1;font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit-strip-close{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:0 2px}
.irow{display:flex;align-items:flex-end;gap:9px}
.minput{flex:1;background:var(--sf2);border:1px solid var(--br);border-radius:13px;padding:10px 15px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;resize:none;max-height:120px;overflow-y:auto;line-height:1.5;transition:.2s}
.minput:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,140,255,.09)}
.minput::placeholder{color:var(--tx3)}
.sbtn{width:40px;height:40px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;flex-shrink:0}
.sbtn:hover{opacity:.9;transform:scale(1.05)}
.sbtn:active{transform:scale(.96)}

/* ── MODALS ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.mo.on{opacity:1;pointer-events:all}
.md{background:var(--sf);border:1px solid var(--br);border-radius:20px;padding:26px;width:380px;max-width:90vw;transform:translateY(10px) scale(.98);transition:.2s;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.mo.on .md{transform:none}
.mt{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.3px}
.mclose{float:right;background:none;border:none;color:var(--tx2);font-size:19px;cursor:pointer;margin-top:-2px}
.mclose:hover{color:var(--tx)}
.urow{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:.12s}
.urow:hover{background:var(--sf2)} .urow.sel{background:rgba(91,140,255,.1)}
.uri{flex:1;min-width:0}
.urn{font-size:14px;font-weight:500}
.uruu{font-size:12px;color:var(--tx2)}
.chk{color:var(--ac);font-size:15px;opacity:0;transition:.12s}
.urow.sel .chk{opacity:1}
.ulist{max-height:260px;overflow-y:auto;margin:0 -4px}
.ulist::-webkit-scrollbar{width:3px}
.ulist::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.gnf{margin-top:14px;padding-top:14px;border-top:1px solid var(--br);display:none}
.gnf.on{display:block}
.gnf label{display:block;font-size:11px;color:var(--tx2);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.gnf input{width:100%;background:var(--sf2);border:1px solid var(--br);border-radius:9px;padding:9px 13px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;transition:.2s}
.gnf input:focus{border-color:var(--ac)}
.mact{display:flex;gap:7px;margin-top:18px}
.mbtn{flex:1;padding:10px;border-radius:9px;border:none;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:.12s}
.mbtn.p{background:var(--ac);color:#fff} .mbtn.p:hover{opacity:.9}
.mbtn.g{background:var(--sf2);color:var(--tx2)} .mbtn.g:hover{color:var(--tx)}
.psec{margin-bottom:14px}
.psec label{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.psec input{width:100%;background:var(--sf2);border:1px solid var(--br);border-radius:9px;padding:9px 13px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;transition:.2s}
.psec input:focus{border-color:var(--ac)}
.pavr{display:flex;align-items:center;gap:13px;margin-bottom:20px}
.pav{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;background-size:cover;background-position:center;cursor:pointer;position:relative;overflow:hidden}
.pav:hover::after{content:'📷';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);font-size:22px}
.av{background-size:cover;background-position:center}
.pui .pn{font-size:16px;font-weight:600}
.pui .pu{font-size:12px;color:var(--tx2);font-family:var(--mono)}
.dbtn{width:100%;padding:10px;border-radius:9px;border:1px solid rgba(255,92,106,.3);background:rgba(255,92,106,.07);color:var(--red);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:.12s;margin-top:7px}
.dbtn:hover{background:rgba(255,92,106,.14)}
.hidden{display:none!important}

/* ── REACTIONS ── */
.rpicker{position:fixed;z-index:300;background:var(--sf);border:1px solid var(--br);border-radius:50px;padding:5px 10px;display:flex;gap:2px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:pop .15s cubic-bezier(.34,1.56,.64,1)}
.rpicker-btn{background:none;border:none;font-size:21px;cursor:pointer;padding:3px 5px;border-radius:50%;transition:transform .12s;line-height:1}
.rpicker-btn:hover{transform:scale(1.4)}
.msg-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.rbadge{display:inline-flex;align-items:center;gap:3px;background:var(--sf2);border:1px solid var(--br);border-radius:12px;padding:2px 7px;font-size:14px;cursor:pointer;transition:.12s;user-select:none;line-height:1.3}
.rbadge:hover{border-color:var(--ac)}
.rbadge.mine{background:rgba(91,140,255,.15);border-color:var(--ac)}
.rbadge .rcount{font-size:11px;color:var(--tx2);font-family:var(--mono)}
.post-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.padd-btn{background:var(--sf2);border:1px solid var(--br);border-radius:12px;padding:2px 8px;font-size:15px;cursor:pointer;transition:.12s;line-height:1.4}
.padd-btn:hover{border-color:var(--ac);background:var(--sf3)}

/* ── SIDEBAR TABS ── */
.stabs{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--br)}
.stab{flex:1;padding:7px 0;border:none;background:transparent;color:var(--tx2);font-family:var(--font);font-size:13px;font-weight:500;border-radius:7px;cursor:pointer;transition:.15s}
.stab.on{background:var(--sf2);color:var(--tx)}

/* ── FEED AREA ── */
#farea{flex:1;display:none;overflow-y:auto;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(91,140,255,.04),transparent 60%)}
#farea.on{display:flex;flex-direction:column;align-items:center}
#farea::-webkit-scrollbar{width:3px}
#farea::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.feed{width:100%;max-width:560px;padding:20px 0 40px;display:flex;flex-direction:column;gap:18px}
.feed-hdr{width:100%;max-width:560px;padding:16px 0 4px;display:flex;align-items:center;justify-content:space-between}
.feed-hdr-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.new-post-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:9px;color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.new-post-btn:hover{opacity:.9;transform:translateY(-1px)}
.post-card{background:var(--sf);border:1px solid var(--br);border-radius:16px;overflow:hidden;animation:pop .2s cubic-bezier(.34,1.56,.64,1)}
.post-ph{display:flex;align-items:center;gap:10px;padding:13px 16px}
.post-img{width:100%;max-height:540px;object-fit:cover;display:block;cursor:pointer}
.post-body{padding:10px 16px 14px}
.post-actions{display:flex;align-items:center;gap:2px;margin-bottom:8px}
.pabtn{background:none;border:none;cursor:pointer;font-size:22px;padding:4px 6px;border-radius:8px;transition:.15s;line-height:1}
.pabtn:hover{background:var(--sf2)}
.pabtn.liked{animation:heartpop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes heartpop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
.post-likes{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:5px}
.post-cap{font-size:14px;line-height:1.5;word-break:break-word}
.post-cap strong{font-weight:600}
.post-clink{font-size:13px;color:var(--tx2);cursor:pointer;margin-top:5px;display:inline-block}
.post-clink:hover{color:var(--tx)}
.post-ts{font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:6px}
.feed-more{text-align:center;padding:4px 0}
.feed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--tx3);gap:12px}
.feed-empty-ico{font-size:40px;opacity:.3}

/* ── CREATE POST MODAL ── */
.cpm-dz{border:2px dashed var(--br);border-radius:12px;min-height:180px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;overflow:hidden;position:relative;margin-bottom:14px}
.cpm-dz:hover{border-color:var(--ac);background:rgba(91,140,255,.04)}
.cpm-dz img{width:100%;max-height:320px;object-fit:contain;display:block}
.cpm-hint{color:var(--tx3);font-size:14px;text-align:center;padding:20px;pointer-events:none}
.cpm-cap{width:100%;background:var(--sf2);border:1px solid var(--br);border-radius:9px;padding:9px 13px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;resize:none;transition:.2s;margin-bottom:4px}
.cpm-cap:focus{border-color:var(--ac)}
.cpm-cap::placeholder{color:var(--tx3)}

/* ── COMMENTS MODAL ── */
.cmm-list{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.cmm-list::-webkit-scrollbar{width:3px}
.cmm-list::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.cmrow{display:flex;gap:8px;align-items:flex-start}
.cmtext{flex:1;min-width:0}
.cmname{font-size:13px;font-weight:600;margin-bottom:2px}
.cmbody{font-size:14px;word-break:break-word;line-height:1.4}
.cmts{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:2px}
.cminrow{display:flex;gap:8px;align-items:center}
.cminput{flex:1;background:var(--sf2);border:1px solid var(--br);border-radius:9px;padding:9px 13px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;transition:.2s}
.cminput:focus{border-color:var(--ac)}
.cminput::placeholder{color:var(--tx3)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="abox">
    <div class="alogo"><div class="alogo-ico">💬</div><div class="alogo-name">AirWind</div></div>
    <div class="atabs">
      <button class="atab on" onclick="switchTab('login')">Войти</button>
      <button class="atab" onclick="switchTab('register')">Регистрация</button>
    </div>
    <div id="cstat" class="conn">Подключение...</div>
    <div id="aerr" class="aerr"></div>
    <div id="lform">
      <div class="afield"><label>Имя пользователя</label><input id="lu" placeholder="username" type="text"></div>
      <div class="afield"><label>Пароль</label><input id="lp" placeholder="••••••" type="password"></div>
      <button class="abtn" id="lbtn" onclick="doLogin()" disabled>Войти</button>
    </div>
    <div id="rform" class="hidden">
      <div class="afield"><label>Имя</label><input id="rn" placeholder="Иван Петров"></div>
      <div class="afield"><label>Имя пользователя</label><input id="ru" placeholder="ivan_petrov"></div>
      <div class="afield"><label>Пароль</label><input id="rp" placeholder="минимум 6 символов" type="password"></div>
      <div class="afield"><label>Повторите</label><input id="rp2" placeholder="••••••" type="password"></div>
      <button class="abtn" id="rbtn" onclick="doRegister()" disabled>Создать аккаунт</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="sidebar">
    <div class="sh">
      <div class="slogo">💬</div>
      <div class="stitle">AirWind</div>
      <button class="ibtn" title="Новый чат" onclick="openNewChat()">✏️</button>
      <button class="ibtn" title="Профиль" onclick="openProfile()">👤</button>
    </div>
    <div class="stabs">
      <button class="stab on" id="stab-chats" onclick="switchSideTab('chats')">💬 Чаты</button>
      <button class="stab" id="stab-feed" onclick="switchSideTab('feed')">📸 Лента</button>
    </div>
    <div id="chats-panel">
      <div class="swrap"><input class="sinput" placeholder="🔍  Поиск..." oninput="filterChats(this.value)" id="search-input"></div>
      <div id="clist"></div>
    </div>
    <div id="feed-sidebar" class="hidden">
      <div style="padding:16px 14px 8px;font-size:12px;color:var(--tx3)">Переключитесь на ленту →</div>
    </div>
  </div>

  <div id="carea">
    <div class="noc" id="noc">
      <div class="noc-ico">💬</div>
      <div style="font-size:15px;font-weight:500;color:var(--tx2)">Выберите чат</div>
      <div style="font-size:13px">или начните новый диалог</div>
    </div>
    <div id="achat" class="hidden" style="display:flex;flex-direction:column;height:100%">
      <div class="ch">
        <div class="av" id="chav" style="border-radius:50%"></div>
        <div class="chi">
          <div class="chname" id="chname"></div>
          <div class="chsub" id="chsub"></div>
          <div class="typing-bar" id="typing-bar"></div>
        </div>
      </div>
      <div id="msgs"></div>
      <div class="ibar">
        <div class="reply-strip" id="reply-strip">
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;color:var(--ac);font-weight:600;margin-bottom:2px" id="reply-name"></div>
            <div class="reply-strip-text" id="reply-text"></div>
          </div>
          <button class="reply-strip-close" onclick="clearReply()">✕</button>
        </div>
        <div class="edit-strip" id="edit-strip">
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;color:var(--yellow);font-weight:600;margin-bottom:2px">Редактирование</div>
            <div class="edit-strip-text" id="edit-text"></div>
          </div>
          <button class="edit-strip-close" onclick="clearEdit()">✕</button>
        </div>
        <div class="irow">
          <textarea class="minput" id="minput" rows="1" placeholder="Написать сообщение..."
            oninput="onInput(this)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
          <button class="sbtn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Feed Area -->
  <div id="farea">
    <div class="feed-hdr">
      <div class="feed-hdr-title">Лента</div>
      <button class="new-post-btn" onclick="openPostModal()">📷 Новая запись</button>
    </div>
    <div class="feed" id="feed-list"></div>
    <div class="feed-more">
      <button id="feed-more-btn" class="mbtn g" style="width:180px;display:none" onclick="loadMoreFeed()">Загрузить ещё</button>
    </div>
  </div>
</div>

<!-- Create Post Modal -->
<div class="mo" id="cpm">
  <div class="md" style="width:440px">
    <button class="mclose" onclick="CM('cpm');pendingPostMedia=null">✕</button>
    <div class="mt">Новая запись</div>
    <div class="cpm-dz" id="cpm-dz" onclick="document.getElementById('postfile').click()">
      <div class="cpm-hint" id="cpm-hint">📷 Нажмите чтобы выбрать фото</div>
    </div>
    <input type="file" id="postfile" accept="image/*" style="display:none" onchange="pickPostPhoto(this)">
    <textarea id="cpm-cap" class="cpm-cap" placeholder="Подпись..." rows="3"></textarea>
    <div class="mact">
      <button class="mbtn g" onclick="CM('cpm');pendingPostMedia=null">Отмена</button>
      <button class="mbtn p" id="cpm-submit" onclick="submitPost()" disabled>Опубликовать</button>
    </div>
  </div>
</div>

<!-- Comments Modal -->
<div class="mo" id="cmm">
  <div class="md" style="width:460px">
    <button class="mclose" onclick="CM('cmm')">✕</button>
    <div class="mt">Комментарии</div>
    <div class="cmm-list" id="cmm-list"></div>
    <div class="cminrow">
      <input id="cmm-inp" class="cminput" placeholder="Написать комментарий..."
        onkeydown="if(event.key==='Enter')submitComment()">
      <button class="sbtn" onclick="submitComment()">➤</button>
    </div>
  </div>
</div>

<!-- New Chat Modal -->
<div class="mo" id="ncm">
  <div class="md">
    <button class="mclose" onclick="CM('ncm')">✕</button>
    <div class="mt">Новый чат</div>
    <div class="ulist" id="ulist"></div>
    <div class="gnf" id="gnf"><label>Название группы</label><input id="gni" placeholder="Моя группа"></div>
    <div class="mact">
      <button class="mbtn g" onclick="CM('ncm')">Отмена</button>
      <button class="mbtn p" id="scbtn" onclick="startChat()">Начать чат</button>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="mo" id="pm">
  <div class="md">
    <button class="mclose" onclick="CM('pm')">✕</button>
    <div class="mt">Профиль</div>
    <div class="pavr">
      <div class="pav" id="pav" onclick="document.getElementById('avfile').click()"></div>
      <input type="file" id="avfile" accept="image/*" style="display:none" onchange="pickAvatar(this)">
      <div class="pui"><div class="pn" id="pdn"></div><div class="pu" id="pun"></div></div>
    </div>
    <div class="psec"><label>Имя</label><input id="pni" type="text"></div>
    <div class="psec"><label>Статус</label><input id="psi" placeholder="Привет, я в AirWind!"></div>
    <div class="mact" style="flex-direction:column">
      <button class="mbtn p" onclick="saveProfile()">Сохранить</button>
      <button class="dbtn" onclick="logout()">Выйти</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let ws=null, me=null, openChatId=null, selUsers=[], editMsgId=null, pendingAvatarUrl=null;
let pendingPostMedia=null, currentCommentPostId=null, sideTab='chats';
const S={users:{},chats:{},msgs:{},unread:{},online:new Set(),feed:[],comments:{}};

// ════════════════════════════════════
//  WS
// ════════════════════════════════════
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{
    setConn('Сервер доступен','ok');
    document.querySelectorAll('.abtn').forEach(b=>b.disabled=false);
    const saved=JSON.parse(localStorage.getItem('aw_creds')||'null');
    if(saved&&!me) emit('login',saved);
  };
  ws.onclose=()=>{
    setConn('Нет соединения — переподключение...','err');
    document.querySelectorAll('.abtn').forEach(b=>b.disabled=true);
    setTimeout(connect,2000);
  };
  ws.onerror=()=>{};
  ws.onmessage=e=>{let p;try{p=JSON.parse(e.data)}catch{return}handle(p)};
}
function emit(type,payload){ws&&ws.readyState===1&&ws.send(JSON.stringify({type,payload}))}

function handle({type,payload}){
  switch(type){
    case 'auth_ok':
      me=payload.user; S.users[me.id]=me;
      document.getElementById('auth').style.display='none';
      document.getElementById('app').classList.add('on');
      renderList(); openChat('__global__'); break;

    case 'error': showErr(payload.msg); break;

    case 'users':
      payload.users.forEach(u=>S.users[u.id]=u);
      renderList(); break;

    case 'user_joined':
    case 'user_updated':
      S.users[payload.user.id]=payload.user;
      renderList();
      if(openChatId)updateHeader(openChatId); break;

    case 'online':
      S.online=new Set(payload.userIds);
      renderList();
      if(openChatId)updateHeader(openChatId); break;

    case 'chats':
      payload.chats.forEach(c=>{S.chats[c.id]=c;if(!S.msgs[c.id])S.msgs[c.id]=[]});
      renderList(); break;

    case 'chat_history':
      S.msgs[payload.chatId]=payload.messages;
      S.unread[payload.chatId]=payload.messages.filter(m=>me&&!m.readBy.includes(me.id)&&m.senderId!==me.id).length;
      if(openChatId===payload.chatId)renderMsgs(payload.chatId);
      renderList(); break;

    case 'chat_history_more': {
      const existing=S.msgs[payload.chatId]||[];
      S.msgs[payload.chatId]=[...payload.messages,...existing];
      if(openChatId===payload.chatId)renderMsgs(payload.chatId);
      break;}

    case 'chat_created':
      S.chats[payload.chat.id]=payload.chat;
      if(!S.msgs[payload.chat.id])S.msgs[payload.chat.id]=[];
      renderList();
      if(pendingChat===payload.chat.id){pendingChat=null;openChat(payload.chat.id);}
      break;

    case 'new_message':{
      const m=payload.msg;
      if(!S.msgs[m.chatId])S.msgs[m.chatId]=[];
      S.msgs[m.chatId].push(m);
      if(m.senderId!==me.id){
        if(openChatId!==m.chatId){S.unread[m.chatId]=(S.unread[m.chatId]||0)+1;}
        else emit('mark_read',{chatId:m.chatId});
      }
      if(openChatId===m.chatId)appendMsg(m);
      renderList(); break;}

    case 'message_edited':{
      const m=payload.msg;
      const arr=S.msgs[m.chatId]||[];
      const idx=arr.findIndex(x=>x.id===m.id);
      if(idx>=0)arr[idx]=m;
      if(openChatId===m.chatId){
        const el=document.getElementById('m_'+m.id);
        if(el){el.querySelector('.mtext').textContent=m.text;
          const ef=el.querySelector('.medit');if(ef)ef.style.display='inline';else{
            const f=el.querySelector('.mfooter');if(f){const s=document.createElement('span');s.className='medit';s.textContent='изм.';f.insertBefore(s,f.firstChild);}}}
      }
      renderList(); break;}

    case 'message_deleted':{
      const arr=S.msgs[payload.chatId]||[];
      const idx=arr.findIndex(x=>x.id===payload.msgId);
      if(idx>=0)arr[idx]={...arr[idx],text:'Сообщение удалено',deleted:true};
      if(openChatId===payload.chatId){
        const el=document.getElementById('m_'+payload.msgId);
        if(el){const t=el.querySelector('.mtext');t.textContent='Сообщение удалено';t.classList.add('deleted');
          const ma=el.querySelector('.msg-actions');if(ma)ma.remove();}
      }
      renderList(); break;}

    case 'messages_read':{
      const arr=S.msgs[payload.chatId]||[];
      payload.msgIds.forEach(id=>{const m=arr.find(x=>x.id===id);if(m&&!m.readBy.includes(payload.userId))m.readBy.push(payload.userId);});
      if(openChatId===payload.chatId){
        payload.msgIds.forEach(id=>{const el=document.getElementById('m_'+id);if(el){const r=el.querySelector('.mread');if(r)r.textContent='✓✓';}});
      }
      break;}

    case 'typing':{
      if(payload.chatId!==openChatId)break;
      const names=payload.userIds.filter(id=>id!==me.id).map(id=>S.users[id]?.displayName||'?');
      const tb=document.getElementById('typing-bar');
      if(tb)tb.textContent=names.length?names.join(', ')+(names.length===1?' печатает...':' печатают...'):'';
      break;}

    case 'feed':
      if(payload.reset) S.feed=payload.posts;
      else S.feed.push(...payload.posts);
      renderFeed(payload.reset);
      document.getElementById('feed-more-btn').style.display=payload.posts.length===20?'inline-block':'none';
      break;

    case 'new_post':
      S.feed.unshift(payload.post);
      prependPost(payload.post);
      break;

    case 'post_liked':{
      const p=S.feed.find(x=>x.id===payload.postId);
      if(p){p.likes=payload.likes;updatePostLikes(payload.postId,payload.likes);}
      break;}

    case 'new_comment':{
      const cm=payload.comment;
      const p2=S.feed.find(x=>x.id===cm.postId);
      if(p2) p2.commentCount=(p2.commentCount||0)+1;
      updatePostCommentCount(cm.postId, p2?.commentCount||1);
      if(S.comments[cm.postId]) S.comments[cm.postId].push(cm);
      if(currentCommentPostId===cm.postId) appendComment(cm);
      break;}

    case 'comments':
      S.comments[payload.postId]=payload.comments;
      renderComments(payload.postId);
      break;

    case 'post_reacted':{
      const p=S.feed.find(x=>x.id===payload.postId);
      if(p) p.reactions=payload.reactions;
      const rel=document.getElementById('pr_'+payload.postId);
      if(rel) rel.innerHTML=reactionBadgesHtml(payload.reactions,'post',payload.postId);
      break;}

    case 'message_reacted':{
      const arr=S.msgs[payload.chatId]||[];
      const rm=arr.find(x=>x.id===payload.msgId);
      if(rm) rm.reactions=payload.reactions;
      const mel=document.getElementById('mr_'+payload.msgId);
      if(mel) mel.innerHTML=reactionBadgesHtml(payload.reactions,'msg',payload.msgId);
      break;}
  }
}

// ════════════════════════════════════
//  AUTH
// ════════════════════════════════════
function switchTab(t){
  document.querySelectorAll('.atab').forEach((el,i)=>el.classList.toggle('on',i===(t==='login'?0:1)));
  document.getElementById('lform').classList.toggle('hidden',t!=='login');
  document.getElementById('rform').classList.toggle('hidden',t!=='register');
  clearErr();
}
function setConn(msg,cls){const e=document.getElementById('cstat');e.textContent=msg;e.className='conn'+(cls?' '+cls:'');}
function showErr(m){const e=document.getElementById('aerr');e.textContent=m;e.style.display='block';}
function clearErr(){document.getElementById('aerr').style.display='none';}
function doLogin(){clearErr();const u=v('lu').trim().toLowerCase(),p=v('lp');if(!u||!p)return showErr('Заполните все поля');localStorage.setItem('aw_creds',JSON.stringify({username:u,password:p}));emit('login',{username:u,password:p});}
function doRegister(){clearErr();const n=v('rn').trim(),u=v('ru').trim().toLowerCase(),p=v('rp'),p2=v('rp2');if(!n||!u||!p||!p2)return showErr('Заполните все поля');if(p.length<6)return showErr('Пароль минимум 6 символов');if(p!==p2)return showErr('Пароли не совпадают');localStorage.setItem('aw_creds',JSON.stringify({username:u,password:p}));emit('register',{username:u,displayName:n,password:p});}
function logout(){me=null;openChatId=null;localStorage.removeItem('aw_creds');Object.keys(S).forEach(k=>S[k]=k==='online'?new Set():{});document.getElementById('app').classList.remove('on');document.getElementById('auth').style.display='flex';CM('pm');}

// ════════════════════════════════════
//  CHAT LIST
// ════════════════════════════════════
function renderList(filter=''){
  const list=document.getElementById('clist');
  const chats=Object.values(S.chats).filter(c=>c.id!=='__global__').sort((a,b)=>lastTs(b.id)-lastTs(a.id));
  const f=filter.toLowerCase();
  const fil=f?chats.filter(c=>chatName(c).toLowerCase().includes(f)):chats;

  const gm=S.msgs['__global__']||[];
  const gl=gm[gm.length-1];
  const gpu=S.unread['__global__']||0;
  const gprev=gl?(gl.senderId===me?.id?'Вы: ':(uName(gl.senderId)+': '))+gl.text:'Добро пожаловать!';
  const showG=!f||'общий чат'.includes(f)||'airwind'.includes(f);

  let html='';
  if(showG)html+=`<div class="gci${openChatId==='__global__'?' on':''}" onclick="openChat('__global__')">
    <div class="gav">🌐</div>
    <div class="cmeta">
      <div class="cnrow"><div class="cname">Общий чат <span class="gbadge">ALL</span></div><div class="ctime">${gl?ft(gl.ts):''}</div></div>
      <div class="cprev"><span>${esc(gprev)}</span>${gpu?`<span class="ubadge">${gpu>99?'99+':gpu}</span>`:''}</div>
    </div></div>`;

  html+=fil.map(c=>{
    const nm=chatName(c),col=chatColor(c),ini=initials(nm);
    const msgs=S.msgs[c.id]||[];
    const last=msgs[msgs.length-1];
    const prev=last?(last.senderId===me?.id?'Вы: ':'')+last.text:'Нет сообщений';
    const u=S.unread[c.id]||0;
    const isOnline=!c.isGroup&&c.members&&S.online.has(c.members.find(id=>id!==me?.id));
    const otherUser=!c.isGroup&&c.members?S.users[c.members.find(id=>id!==me?.id)]:null;
    const cAvUrl=otherUser?.avatarUrl||'';
    return `<div class="ci${c.id===openChatId?' on':''}" onclick="openChat('${c.id}')">
      <div class="av" style="${avStyle(col,cAvUrl)}">${avInner(nm,cAvUrl)}${isOnline?'<div class="online-dot"></div>':''}</div>
      <div class="cmeta">
        <div class="cnrow"><div class="cname">${esc(nm)}</div><div class="ctime">${last?ft(last.ts):''}</div></div>
        <div class="cprev"><span>${esc(prev)}</span>${u?`<span class="ubadge">${u>99?'99+':u}</span>`:''}</div>
      </div></div>`;
  }).join('');

  if(!html)html=`<div class="eml"><div class="eml-ico">💬</div>${f?'Ничего не найдено':'Нажмите ✏️ чтобы начать'}</div>`;
  list.innerHTML=html;
}
function filterChats(v){renderList(v);}
function lastTs(id){const m=S.msgs[id];return m&&m.length?m[m.length-1].ts:0;}

// ════════════════════════════════════
//  OPEN CHAT
// ════════════════════════════════════
function openChat(id){
  openChatId=id;
  S.unread[id]=0;
  emit('mark_read',{chatId:id});
  document.getElementById('noc').classList.add('hidden');
  const ac=document.getElementById('achat');
  ac.classList.remove('hidden');ac.style.display='flex';
  updateHeader(id);renderMsgs(id);renderList();
  document.getElementById('minput').focus();
}
function updateHeader(id){
  const av=document.getElementById('chav');
  if(id==='__global__'){
    av.textContent='🌐';av.style.background='linear-gradient(135deg,#5b8cff,#7c5cfc)';av.style.borderRadius='13px';
    document.getElementById('chname').textContent='Общий чат';
    document.getElementById('chsub').textContent='Открыт для всех · '+Object.keys(S.users).length+' пользователей';
    return;
  }
  const c=S.chats[id];if(!c)return;
  const nm=chatName(c);
  const otherU=!c.isGroup&&c.members?S.users[c.members.find(id=>id!==me?.id)]:null;
  const hAvUrl=otherU?.avatarUrl||'';
  av.textContent=avInner(nm,hAvUrl);
  av.style.cssText=`${avStyle(chatColor(c),hAvUrl)};background-size:cover;background-position:center;border-radius:50%`;
  document.getElementById('chname').textContent=nm;
  if(c.isGroup){
    document.getElementById('chsub').textContent=c.members.length+' участников';
  } else {
    const oid=c.members.find(i=>i!==me.id);
    const u=S.users[oid];
    const online=S.online.has(oid);
    document.getElementById('chsub').textContent=online?'В сети':(u&&u.status?u.status:(u?'Не в сети':''));
  }
}

// ════════════════════════════════════
//  MESSAGES
// ════════════════════════════════════
function renderMsgs(chatId){
  const area=document.getElementById('msgs');
  const msgs=S.msgs[chatId]||[];
  const isG=chatId==='__global__'||(S.chats[chatId]&&S.chats[chatId].isGroup);
  let html='',lastD='';
  for(const m of msgs){
    const dk=new Date(m.ts).toDateString();
    if(dk!==lastD){html+=`<div class="dchip"><span>${fdh(m.ts)}</span></div>`;lastD=dk;}
    html+=bubbleHtml(m,isG);
  }
  area.innerHTML=html||'<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:13px">Начните переписку</div>';
  area.scrollTop=area.scrollHeight;
}

function appendMsg(m){
  const area=document.getElementById('msgs');
  const isG=m.chatId==='__global__'||(S.chats[m.chatId]&&S.chats[m.chatId].isGroup);
  const msgs=S.msgs[m.chatId]||[];
  if(msgs.length>=2){
    const prev=msgs[msgs.length-2];
    if(new Date(prev.ts).toDateString()!==new Date(m.ts).toDateString())
      area.insertAdjacentHTML('beforeend',`<div class="dchip"><span>${fdh(m.ts)}</span></div>`);
  }
  area.insertAdjacentHTML('beforeend',bubbleHtml(m,isG));
  area.scrollTop=area.scrollHeight;
}

function bubbleHtml(m,isGroup){
  const sent=m.senderId===me?.id;
  const time=`${String(new Date(m.ts).getHours()).padStart(2,'0')}:${String(new Date(m.ts).getMinutes()).padStart(2,'0')}`;
  const read=m.readBy.some(id=>id!==m.senderId);
  const senderRow=(!sent&&isGroup)?`<div class="msender" style="color:${S.users[m.senderId]?.avatarColor||'var(--ac)'}">${esc(uName(m.senderId))}</div>`:'';
  const actions=m.deleted?'':`<div class="msg-actions">
    ${sent?`<button class="mac" title="Редактировать" onclick="startEdit('${m.id}')">✏️</button>`:''}
    ${sent?`<button class="mac" title="Удалить" onclick="delMsg('${m.id}')">🗑️</button>`:''}
    <button class="mac" title="Ответить" onclick="startReply('${m.id}')">↩️</button>
    <button class="mac" title="Реакция" onclick="showReactionPicker(this,'${m.id}','msg')">😊</button>
  </div>`;
  return `<div class="mr ${sent?'sent':'recv'}" id="m_${m.id}">
    ${actions}
    <div class="mb">
      ${senderRow}
      <div class="mtext${m.deleted?' deleted':''}">${esc(m.text)}</div>
      <div class="msg-reactions" id="mr_${m.id}">${reactionBadgesHtml(m.reactions||{},'msg',m.id)}</div>
      <div class="mfooter">
        ${m.edited&&!m.deleted?`<span class="medit">изм.</span>`:''}
        <span class="mtime">${time}</span>
        ${sent?`<span class="mread">${read?'✓✓':'✓'}</span>`:''}
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════
//  SEND / EDIT / DELETE / REPLY
// ════════════════════════════════════
let replyToId=null;
let pendingChat=null;

function sendMsg(){
  if(!openChatId)return;
  const inp=document.getElementById('minput');
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='';
  emit('typing_stop',{chatId:openChatId});

  if(editMsgId){
    emit('edit_message',{msgId:editMsgId,text});
    clearEdit();
  } else {
    emit('send_message',{chatId:openChatId,text});
    clearReply();
  }
}

function startEdit(msgId){
  const arr=S.msgs[openChatId]||[];
  const m=arr.find(x=>x.id===msgId);if(!m)return;
  editMsgId=msgId;
  document.getElementById('edit-strip').classList.add('on');
  document.getElementById('edit-text').textContent=m.text;
  const inp=document.getElementById('minput');
  inp.value=m.text;inp.focus();
  autoResize(inp);
}
function clearEdit(){
  editMsgId=null;
  document.getElementById('edit-strip').classList.remove('on');
  document.getElementById('minput').value='';
}
function delMsg(msgId){if(confirm('Удалить сообщение?'))emit('delete_message',{msgId});}
function startReply(msgId){
  const arr=S.msgs[openChatId]||[];
  const m=arr.find(x=>x.id===msgId);if(!m)return;
  replyToId=msgId;
  document.getElementById('reply-strip').classList.add('on');
  document.getElementById('reply-name').textContent=uName(m.senderId);
  document.getElementById('reply-text').textContent=m.text;
  document.getElementById('minput').focus();
}
function clearReply(){replyToId=null;document.getElementById('reply-strip').classList.remove('on');}

let typingTimer=null;
function onInput(el){
  autoResize(el);
  if(!openChatId)return;
  if(editMsgId)return;
  emit('typing_start',{chatId:openChatId});
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>emit('typing_stop',{chatId:openChatId}),3000);
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ════════════════════════════════════
//  NEW CHAT
// ════════════════════════════════════
function openNewChat(){
  selUsers=[];
  const others=Object.values(S.users).filter(u=>u.id!==me?.id);
  document.getElementById('ulist').innerHTML=others.length
    ?others.map(u=>`<div class="urow" id="ur_${u.id}" onclick="togU('${u.id}')">
        <div class="av" style="${avStyle(u.avatarColor,u.avatarUrl)};width:36px;height:36px;font-size:13px">${avInner(u.displayName,u.avatarUrl)}${S.online.has(u.id)?'<div class="online-dot"></div>':''}</div>
        <div class="uri"><div class="urn">${esc(u.displayName)}</div><div class="uruu">@${esc(u.username)}</div></div>
        <span class="chk">✓</span></div>`).join('')
    :'<div style="padding:18px;text-align:center;color:var(--tx3);font-size:13px">Нет других пользователей</div>';
  document.getElementById('gnf').classList.remove('on');
  document.getElementById('gni').value='';
  OM('ncm');
}
function togU(uid){
  const i=selUsers.indexOf(uid);i>=0?selUsers.splice(i,1):selUsers.push(uid);
  document.querySelectorAll('.urow').forEach(r=>r.classList.remove('sel'));
  selUsers.forEach(id=>{const r=document.getElementById('ur_'+id);if(r)r.classList.add('sel');});
  document.getElementById('gnf').classList.toggle('on',selUsers.length>1);
  document.getElementById('scbtn').textContent=selUsers.length>1?'Создать группу':'Начать чат';
}
function startChat(){
  if(!selUsers.length)return;
  if(selUsers.length===1){
    const ex=Object.values(S.chats).find(c=>!c.isGroup&&c.members.includes(me.id)&&c.members.includes(selUsers[0]));
    if(ex){CM('ncm');openChat(ex.id);return;}
    pendingChat=null;
    emit('create_private_chat',{targetUserId:selUsers[0]});
  } else {
    emit('create_group_chat',{name:v('gni').trim()||'Группа',memberIds:[me.id,...selUsers]});
  }
  CM('ncm');
}

function openProfile(){
  pendingAvatarUrl=null;
  const pav=document.getElementById('pav');
  pav.textContent=avInner(me.displayName,me.avatarUrl);
  pav.style.cssText=`width:56px;height:56px;${avStyle(me.avatarColor,me.avatarUrl)};background-size:cover;background-position:center;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;position:relative;overflow:hidden`;
  document.getElementById('pdn').textContent=me.displayName;
  document.getElementById('pun').textContent='@'+me.username;
  document.getElementById('pni').value=me.displayName;
  document.getElementById('psi').value=me.status||'';
  OM('pm');
}
function saveProfile(){
  const dn=v('pni').trim(),st=v('psi').trim();
  if(!dn)return;
  const upd={displayName:dn,status:st};
  if(pendingAvatarUrl!==null){upd.avatarUrl=pendingAvatarUrl;pendingAvatarUrl=null;}

}

//  MODALS
// ════════════════════════════════════
function OM(id){document.getElementById(id).classList.add('on');}
function CM(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.mo').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('on');}));

// ════════════════════════════════════
//  HELPERS
// ════════════════════════════════════
function chatName(c){if(c.isGroup)return c.name||'Группа';const o=c.members?.find(id=>id!==me?.id);return S.users[o]?.displayName||'Пользователь';}
function chatColor(c){if(c.isGroup)return'#7c5cfc';const o=c.members?.find(id=>id!==me?.id);return S.users[o]?.avatarColor||'#555';}
function uName(id){return S.users[id]?.displayName||'?';}
function avStyle(color,avatarUrl){return avatarUrl?`background:#000;background-image:url(${avatarUrl})`:`background:${color}`;}
function avInner(name,avatarUrl){return avatarUrl?'':initials(name);}
function pickAvatar(inp){
  const file=inp.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas'); c.width=c.height=200;
      c.getContext('2d').drawImage(img,0,0,200,200);
      pendingAvatarUrl=c.toDataURL('image/jpeg',0.85);
      const pav=document.getElementById('pav');
      pav.textContent=''; pav.style.cssText+=`;background-image:url(${pendingAvatarUrl});background-size:cover;background-position:center`;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  inp.value='';
}
function initials(n){if(!n)return'?';const p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n[0].toUpperCase();}
function ft(ts){const d=new Date(ts),now=new Date(),pad=n=>String(n).padStart(2,'0');if(d.toDateString()===now.toDateString())return pad(d.getHours())+':'+pad(d.getMinutes());if(d.getFullYear()===now.getFullYear())return pad(d.getDate())+'.'+pad(d.getMonth()+1);return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();}
function fdh(ts){const d=new Date(ts),now=new Date(),yes=new Date(Date.now()-864e5);if(d.toDateString()===now.toDateString())return'Сегодня';if(d.toDateString()===yes.toDateString())return'Вчера';const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];return d.getDate()+' '+m[d.getMonth()]+(d.getFullYear()!==now.getFullYear()?' '+d.getFullYear():'');}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function v(id){return(document.getElementById(id)||{}).value||'';}

// enter keys
// ════════════════════════════════════
//  REACTIONS
// ════════════════════════════════════
const EMOJIS=['❤️','😂','😮','😢','👍','👎','🔥','🎉'];
let pickerEl=null, pickerOff=null;

function reactionBadgesHtml(reactions, type, id){
  if(!reactions||!Object.keys(reactions).length) return '';
  return Object.entries(reactions).map(([emoji,userIds])=>{
    const mine=me&&userIds.includes(me.id);
    return `<button class="rbadge${mine?' mine':''}" onclick="quickReact('${id}','${emoji}','${type}')">${emoji}<span class="rcount">${userIds.length}</span></button>`;
  }).join('');
}

function quickReact(id,emoji,type){
  if(type==='msg') emit('react_message',{msgId:id,emoji});
  else emit('react_post',{postId:id,emoji});
}

function showReactionPicker(triggerEl,id,type){
  if(pickerEl){closePicker();return;}
  const picker=document.createElement('div');
  picker.className='rpicker';
  picker.innerHTML=EMOJIS.map(e=>`<button class="rpicker-btn" onclick="pickReaction('${id}','${e}','${type}')">${e}</button>`).join('');
  document.body.appendChild(picker);
  pickerEl=picker;
  const r=triggerEl.getBoundingClientRect();
  const pw=picker.offsetWidth||240;
  let left=r.left-(pw/2)+(r.width/2);
  left=Math.max(8,Math.min(left,window.innerWidth-pw-8));
  picker.style.left=left+'px';
  picker.style.top=(r.top-picker.offsetHeight-10+window.scrollY)+'px';
  pickerOff=e=>{if(!picker.contains(e.target)&&e.target!==triggerEl){closePicker();}};
  setTimeout(()=>document.addEventListener('click',pickerOff),0);
}

function closePicker(){
  if(pickerEl){pickerEl.remove();pickerEl=null;}
  if(pickerOff){document.removeEventListener('click',pickerOff);pickerOff=null;}
}

function pickReaction(id,emoji,type){
  closePicker();
  if(type==='msg') emit('react_message',{msgId:id,emoji});
  else emit('react_post',{postId:id,emoji});
}

function switchSideTab(tab){
  sideTab=tab;
  document.getElementById('stab-chats').classList.toggle('on',tab==='chats');
  document.getElementById('stab-feed').classList.toggle('on',tab==='feed');
  document.getElementById('chats-panel').classList.toggle('hidden',tab!=='chats');
  document.getElementById('feed-sidebar').classList.toggle('hidden',tab!=='feed');
  document.getElementById('carea').style.display=tab==='chats'?'':'none';
  document.getElementById('farea').classList.toggle('on',tab==='feed');
  if(tab==='feed'&&S.feed.length===0) emit('load_feed',{});
}

function postCardHtml(p){
  const u=S.users[p.userId]||{};
  const liked=me&&p.likes.includes(me.id);
  const likesText=p.likes.length===0?'':p.likes.length===1?'1 отметка «нравится»':`${p.likes.length} отметок «нравится»`;
  const commText=p.commentCount>0?(p.commentCount===1?'1 комментарий':`${p.commentCount} комментариев`):'Написать комментарий';
  return `<div class="post-card" id="post_${p.id}">
    <div class="post-ph">
      <div class="av" style="${avStyle(u.avatarColor||'#555',u.avatarUrl||'')};width:38px;height:38px;font-size:13px;flex-shrink:0">${avInner(u.displayName||'?',u.avatarUrl||'')}</div>
      <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${esc(u.displayName||'?')}</div><div style="font-size:11px;color:var(--tx3);font-family:var(--mono)">${ft(p.ts)}</div></div>
    </div>
    <img class="post-img" src="${p.mediaData}" loading="lazy" onclick="openImageFull('${p.id}')">
    <div class="post-body">
      <div class="post-actions">
        <button class="pabtn${liked?' liked':''}" id="like_${p.id}" onclick="likePost('${p.id}')" title="Нравится">${liked?'❤️':'🤍'}</button>
        <button class="pabtn" onclick="openComments('${p.id}')" title="Комментарии">💬</button>
        <button class="padd-btn" onclick="showReactionPicker(this,'${p.id}','post')" title="Реакция">＋</button>
      </div>
      <div class="post-reactions" id="pr_${p.id}">${reactionBadgesHtml(p.reactions||{},'post',p.id)}</div>
      ${likesText?`<div class="post-likes" id="likes_${p.id}">${esc(likesText)}</div>`:`<div class="post-likes" id="likes_${p.id}" style="display:none"></div>`}
      ${p.caption?`<div class="post-cap"><strong>${esc(u.displayName||'')}</strong> ${esc(p.caption)}</div>`:''}
      <div class="post-clink" id="ccount_${p.id}" onclick="openComments('${p.id}')">${commText}</div>
      <div class="post-ts">${fts(p.ts)}</div>
    </div>
  </div>`;
}

function renderFeed(reset){
  const el=document.getElementById('feed-list');
  if(reset||!el.children.length){
    if(S.feed.length===0){
      el.innerHTML=`<div class="feed-empty"><div class="feed-empty-ico">📸</div><div>Лента пока пустая</div><div style="font-size:12px">Будьте первым — поделитесь фото!</div></div>`;
    } else {
      el.innerHTML=S.feed.map(postCardHtml).join('');
    }
  } else {
    S.feed.slice(-(S.feed.length - el.querySelectorAll('.post-card').length)).forEach(p=>{
      el.insertAdjacentHTML('beforeend',postCardHtml(p));
    });
  }
}

function prependPost(p){
  const el=document.getElementById('feed-list');
  const empty=el.querySelector('.feed-empty');
  if(empty) empty.remove();
  el.insertAdjacentHTML('afterbegin',postCardHtml(p));
}

function updatePostLikes(postId, likes){
  const btn=document.getElementById('like_'+postId);
  const lel=document.getElementById('likes_'+postId);
  if(!btn||!lel) return;
  const liked=me&&likes.includes(me.id);
  btn.textContent=liked?'❤️':'🤍';
  btn.classList.toggle('liked',liked);
  const n=likes.length;
  if(n===0){lel.style.display='none';lel.textContent='';}
  else{lel.style.display='';lel.textContent=n===1?'1 отметка «нравится»':`${n} отметок «нравится»`;}
}

function updatePostCommentCount(postId, count){
  const el=document.getElementById('ccount_'+postId);
  if(!el) return;
  el.textContent=count>0?(count===1?'1 комментарий':`${count} комментариев`):'Написать комментарий';
}

function loadMoreFeed(){
  const oldest=S.feed[S.feed.length-1];
  if(oldest) emit('load_feed',{before:oldest.ts});
}

function likePost(postId){emit('like_post',{postId});}

function openComments(postId){
  currentCommentPostId=postId;
  document.getElementById('cmm-list').innerHTML='<div style="color:var(--tx3);font-size:13px;text-align:center;padding:20px">Загрузка...</div>';
  document.getElementById('cmm-inp').value='';
  OM('cmm');
  if(S.comments[postId]) renderComments(postId);
  else emit('load_comments',{postId});
}

function renderComments(postId){
  const list=S.comments[postId]||[];
  const el=document.getElementById('cmm-list');
  if(!el) return;
  if(list.length===0){el.innerHTML='<div style="color:var(--tx3);font-size:13px;text-align:center;padding:20px">Комментариев пока нет</div>';return;}
  el.innerHTML=list.map(c=>{
    const u=S.users[c.userId]||{};
    return `<div class="cmrow">
      <div class="av" style="${avStyle(u.avatarColor||'#555',u.avatarUrl||'')};width:32px;height:32px;font-size:12px;flex-shrink:0">${avInner(u.displayName||'?',u.avatarUrl||'')}</div>
      <div class="cmtext">
        <div class="cmname">${esc(u.displayName||'?')}</div>
        <div class="cmbody">${esc(c.text)}</div>
        <div class="cmts">${fts(c.ts)}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function appendComment(c){
  const el=document.getElementById('cmm-list');
  if(!el) return;
  const empty=el.querySelector('div[style*="padding:20px"]');
  if(empty) empty.remove();
  const u=S.users[c.userId]||{};
  el.insertAdjacentHTML('beforeend',`<div class="cmrow">
    <div class="av" style="${avStyle(u.avatarColor||'#555',u.avatarUrl||'')};width:32px;height:32px;font-size:12px;flex-shrink:0">${avInner(u.displayName||'?',u.avatarUrl||'')}</div>
    <div class="cmtext">
      <div class="cmname">${esc(u.displayName||'?')}</div>
      <div class="cmbody">${esc(c.text)}</div>
      <div class="cmts">${fts(c.ts)}</div>
    </div>
  </div>`);
  el.scrollTop=el.scrollHeight;
}

function submitComment(){
  const inp=document.getElementById('cmm-inp');
  const text=inp.value.trim();
  if(!text||!currentCommentPostId) return;
  emit('add_comment',{postId:currentCommentPostId,text});
  inp.value='';
}

function openPostModal(){
  pendingPostMedia=null;
  document.getElementById('cpm-dz').innerHTML='<div class="cpm-hint">📷 Нажмите чтобы выбрать фото</div>';
  document.getElementById('cpm-cap').value='';
  document.getElementById('cpm-submit').disabled=true;
  OM('cpm');
}

function pickPostPhoto(inp){
  const file=inp.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1200,maxH=1200;
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      pendingPostMedia=c.toDataURL('image/jpeg',0.82);
      document.getElementById('cpm-dz').innerHTML=`<img src="${pendingPostMedia}" style="width:100%;max-height:320px;object-fit:contain;display:block;border-radius:8px">`;
      document.getElementById('cpm-submit').disabled=false;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  inp.value='';
}

function submitPost(){
  if(!pendingPostMedia) return;
  emit('create_post',{mediaData:pendingPostMedia,caption:document.getElementById('cpm-cap').value.trim()});
  pendingPostMedia=null;
  CM('cpm');
  if(sideTab!=='feed') switchSideTab('feed');
}

function openImageFull(postId){
  const p=S.feed.find(x=>x.id===postId); if(!p) return;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  ov.innerHTML=`<img src="${p.mediaData}" style="max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain">`;
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
}

function fts(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
}

['lu','lp'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));
['rn','ru','rp','rp2'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();}));

connect();
